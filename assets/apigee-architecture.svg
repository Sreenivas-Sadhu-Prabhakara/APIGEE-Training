<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Apigee training architecture</title>
  <desc id="desc">Clients flow through Apigee gateway security controls to services, products, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef5ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#234" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="920" height="560" rx="28" fill="url(#bg)"/>
  <g fill="none" stroke="#6f7f8e" stroke-width="4" stroke-linecap="round">
    <path d="M145 165H290"/>
    <path d="M145 280H290"/>
    <path d="M145 395H290"/>
    <path d="M560 280H720"/>
    <path d="M455 185v-60h265"/>
    <path d="M455 375v70h265"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="120" height="90" rx="18" fill="#ffffff"/>
    <rect x="40" y="235" width="120" height="90" rx="18" fill="#ffffff"/>
    <rect x="40" y="350" width="120" height="90" rx="18" fill="#ffffff"/>
    <rect x="280" y="120" width="300" height="320" rx="26" fill="#ffffff"/>
    <rect x="710" y="90" width="160" height="85" rx="18" fill="#ffffff"/>
    <rect x="710" y="237" width="160" height="85" rx="18" fill="#ffffff"/>
    <rect x="710" y="385" width="160" height="85" rx="18" fill="#ffffff"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#17202a">
    <text x="100" y="156" text-anchor="middle" font-size="16" font-weight="700">Mobile</text>
    <text x="100" y="182" text-anchor="middle" font-size="13" fill="#61717f">OAuth + PKCE</text>
    <text x="100" y="271" text-anchor="middle" font-size="16" font-weight="700">Partner</text>
    <text x="100" y="297" text-anchor="middle" font-size="13" fill="#61717f">JWT / mTLS</text>
    <text x="100" y="386" text-anchor="middle" font-size="16" font-weight="700">Internal</text>
    <text x="100" y="412" text-anchor="middle" font-size="13" fill="#61717f">API key</text>
    <text x="430" y="158" text-anchor="middle" font-size="24" font-weight="800">Apigee gateway</text>
    <text x="430" y="192" text-anchor="middle" font-size="14" fill="#61717f">proxy, policies, shared flows</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="325" y="225" width="210" height="38" rx="10" fill="#e7f1ff"/>
    <text x="430" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#16446f">Authenticate</text>
    <rect x="325" y="276" width="210" height="38" rx="10" fill="#e9f8ef"/>
    <text x="430" y="301" text-anchor="middle" font-size="14" font-weight="700" fill="#285c34">Authorize</text>
    <rect x="325" y="327" width="210" height="38" rx="10" fill="#fff2df"/>
    <text x="430" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#7a4b00">Protect traffic</text>
    <text x="790" y="126" text-anchor="middle" font-size="16" font-weight="700" fill="#17202a">API product</text>
    <text x="790" y="151" text-anchor="middle" font-size="13" fill="#61717f">plans + scopes</text>
    <text x="790" y="273" text-anchor="middle" font-size="16" font-weight="700" fill="#17202a">Services</text>
    <text x="790" y="298" text-anchor="middle" font-size="13" fill="#61717f">Cloud Run / apps</text>
    <text x="790" y="421" text-anchor="middle" font-size="16" font-weight="700" fill="#17202a">Observability</text>
    <text x="790" y="446" text-anchor="middle" font-size="13" fill="#61717f">logs + analytics</text>
  </g>
</svg>
